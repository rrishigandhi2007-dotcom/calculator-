<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
      <title>
        Calculator</title>
      <style>
        *{margin:0;
        padding:0;
        box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;
        background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center}
        .calculator{background:white;
        border-radius:15px;
        padding:20px;
        box-shadow:0 20px 60px rgba(0,0,0,0.3);
        width:320px}
        .display{background:#333;
        color:#00d4ff;
        font-size:2rem;
        padding:20px;
        border-radius:8px;
        text-align:right;
        margin-bottom:20px;
        font-weight:bold;
        word-wrap:break-word}
        .buttons{display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px}
        button{padding:20px;
        font-size:1.2rem;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-weight:600;
        transition:all 0.2s}
        button:hover{transform:translateY(-2px)}
        .num{background:#e0e0e0}
        .op{background:#667eea;
        color:white}
        .eq{background:#4ade80;
        color:white;
        grid-column:span 2}
        .clear{background:#ef4444;
        color:white;
        grid-column:span 2}
        </style>
      </head>
    <body>
      <div class="calculator">
        <div class="display" id="display">
          0</div>
        <div class="buttons">
          <button class="clear" onclick="clear()">
            C</button>
          <button class="op" onclick="append('/')">
            ÷</button>
          <button class="op" onclick="append('*')">
            ×</button>
          <button class="num" onclick="append('7')">
            7</button>
          <button class="num" onclick="append('8')">
            8</button>
          <button class="num" onclick="append('9')">
            9</button>
          <button class="op" onclick="append('-')">
            −</button>
          <button class="num" onclick="append('4')">
            4</button>
          <button class="num" onclick="append('5')">
            5</button>
          <button class="num" onclick="append('6')">
            6</button>
          <button class="op" onclick="append('+')">
            +</button>
          <button class="num" onclick="append('1')">
            1</button>
          <button class="num" onclick="append('2')">
            2</button>
          <button class="num" onclick="append('3')">
            3</button>
          <button class="num" onclick="append('.')">
            .</button>
          <button class="num" onclick="append('0')" style="grid-column:span 2">
            0</button>
          <button class="eq" onclick="calculate()">
            =</button>
          </div>
        </div>
      <script>
        let display=document.getElementById('display');
        function append(val){display.textContent=display.textContent==='0'?val:display.textContent+val;
        }
        function clear(){display.textContent='0';
        }
        function calculate(){try{display.textContent=eval(display.textContent);
        }
        catch(e){display.textContent='Error';
        }
        }
        </script>
      </body>
    </html>
